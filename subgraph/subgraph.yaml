specVersion: 1.0.0
description: Cumulative all-time ETH ever shielded in Ethereum privacy protocols
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: AztecRollupProcessor
    network: mainnet
    source:
      address: "0xFF1F2B4ADb9dF6FC8eAFecDcbF96A2B351680455"
      abi: AztecRollupProcessor
      startBlock: 14923081
      endBlock: 19580000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - GlobalCounter
        - ProtocolCounter
      abis:
        - name: AztecRollupProcessor
          file: ./abis/AztecRollupProcessor.json
      eventHandlers:
        - event: Deposit(indexed uint256,indexed address,uint256)
          handler: handleAztecDeposit
      file: ./src/aztec.ts
