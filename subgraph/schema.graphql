type GlobalCounter @entity(immutable: false) {
  id: ID!
  totalETH: BigInt!
  depositCount: BigInt!
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

type ProtocolCounter @entity(immutable: false) {
  id: ID!
  name: String!
  totalETH: BigInt!
  depositCount: BigInt!
  firstDepositBlock: BigInt!
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}
