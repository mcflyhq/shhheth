type TornadoGlobal @entity(immutable: false) {
  id: ID!
  totalShieldedETH: BigInt! # cumulative across all Tornado ETH pools
  lastUpdatedBlock: BigInt!
  lastUpdatedTimestamp: BigInt!
}

type TornadoDailyInflow @entity(immutable: false) {
  id: ID! # day since epoch
  date: String!
  shieldedETH: BigInt!
}

type TornadoPoolContribution @entity(immutable: false) {
  id: ID! # pool address or denomination label
  pool: String! # "0.1", "1", "10", "100"
  totalShieldedETH: BigInt!
}

"""
Per-deposit event for flow.shhheth. Immutable; one row per Deposit log.
`from` is the submitting EOA (tx.from) — not proven ownership of the note.
"""
type TornadoDeposit @entity(immutable: true) {
  id: ID! # txHash-logIndex
  pool: String! # "0.1" | "1" | "10" | "100"
  amount: BigInt!
  from: Bytes!
  commitment: Bytes!
  leafIndex: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
}

"""
Per-withdrawal event for flow.shhheth. Immutable; one row per Withdrawal log.
No on-chain link to a deposit — that is the privacy property.
"""
type TornadoWithdrawal @entity(immutable: true) {
  id: ID! # txHash-logIndex
  pool: String!
  amount: BigInt!
  to: Bytes!
  relayer: Bytes!
  nullifierHash: Bytes!
  fee: BigInt!
  timestamp: BigInt!
  blockNumber: BigInt!
  txHash: Bytes!
  logIndex: BigInt!
}
