    name: Tornado01ETH
    network: mainnet
    source:
      address: "0x12d66f87a04a9e220743712ce6d9bb1b5616b8fc"
      abi: TornadoPool
      startBlock: 9000000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - TornadoGlobal
        - TornadoDailyInflow
        - TornadoPoolContribution
        - TornadoDeposit
        - TornadoWithdrawal
      abis:
        - name: TornadoPool
          file: ./abis/TornadoPool.json
      eventHandlers:
        - event: Deposit(indexed bytes32,uint32,uint256)
